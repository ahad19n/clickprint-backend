openapi: 3.0.3
info:
  version: 0.0.1
  title: ClickPrint API Specification
  description: API contract generated from the current Express implementation.

servers:
  - url: https://cp-server.wckd.pk

tags:
  - name: system
  - name: auth
  - name: files
  - name: jobs
  - name: shops
  - name: history
  - name: profile

paths:
  /health:
    get:
      tags:
        - system
      summary: Health check
      description: Returns `200` when MongoDB is reachable and `503` otherwise.
      responses:
        '200':
          description: Service is healthy.
        '503':
          description: Service is unhealthy.

  /api/auth/otp:
    post:
      tags:
        - auth
      summary: Send an OTP
      description: Sends a 5-digit OTP to the provided WhatsApp number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: OTP Sent Successfully
                data: {}
        '400':
          description: Missing phone number or invalid E.164 number without `+`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  value:
                    success: false
                    message: Missing or empty fields (number)
                    data: {}
                invalid:
                  value:
                    success: false
                    message: Field 'number' is not valid E164 (without +)
                    data: {}
        '429':
          description: An active OTP already exists for the number.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Too many requests
                data: {}
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/verify:
    post:
      tags:
        - auth
      summary: Verify an OTP
      description: Verifies an OTP and returns a JWT plus the user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthVerifyData'
              example:
                success: true
                message: Verified OTP Successfully
                data:
                  token: <jwt>
                  profile:
                    _id: 507f1f77bcf86cd799439011
                    name: ''
                    balance: 0
                    number: '923001234567'
        '400':
          description: Missing code or number.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Missing or empty fields (code, number).
                data: {}
        '401':
          description: OTP was invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid or expired OTP.
                data: {}
        '429':
          description: OTP verification attempts exhausted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Too many requests. Try again later.
                data: {}
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/files:
    post:
      tags:
        - files
      summary: Upload a file
      description: |
        Uploads a file for the authenticated user.

        The server accepts multipart uploads under the `file` field. PDFs are processed directly. Non-PDF files are submitted to Gotenberg for conversion before metadata is read.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File uploaded successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FileUploadData'
              example:
                success: true
                message: File Uploaded Successfully
                data:
                  fileId: 7f5ef3030d649a53bb323029ba3bad31
        '400':
          description: File is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: No File Provided
                data: {}
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/files/{fileId}:
    get:
      tags:
        - files
      summary: Download a stored file
      description: Downloads a previously uploaded file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File downloaded successfully.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          description: File was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: File Not Found
                data: {}
    put:
      tags:
        - files
      summary: Store converted file content
      description: Internal webhook endpoint used by Gotenberg to upload converted file content.
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: File content stored successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FileUploadData'
              example:
                success: true
                message: Updated File Successfully
                data:
                  fileId: 7f5ef3030d649a53bb323029ba3bad31
        '401':
          $ref: '#/components/responses/ApiKeyUnauthorizedResponse'
        '404':
          description: File ID format is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: File Not Found
                data: {}
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/files/temp/{fileId}:
    get:
      tags:
        - files
      summary: Download a temporary file
      description: Internal endpoint used during conversion to fetch the temporary uploaded file.
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Temporary file downloaded successfully.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/ApiKeyUnauthorizedResponse'
        '404':
          description: File was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: File Not Found
                data: {}

  /api/jobs:
    get:
      tags:
        - jobs
      summary: List active jobs
      description: Returns jobs created by the authenticated user whose status is `pending` or `queued`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Jobs fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'
              example:
                success: true
                message: Fetched Jobs Successfully
                data:
                  - _id: 507f1f77bcf86cd799439021
                    createdAt: '2026-03-14T10:00:00.000Z'
                    status: pending
                    forShop: 507f1f77bcf86cd799439031
                    createdBy: 507f1f77bcf86cd799439011
                    files:
                      - hash: 7f5ef3030d649a53bb323029ba3bad31
                        settings:
                          color: false
                          pageType: A4
                          orientation: portrait
                          pagesPerSheet: 1
                          numberOfCopies: 2
                          pageSelection: all
                          sidedness: single
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - jobs
      summary: Create a job
      description: Creates a new print job for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
              example:
                success: true
                message: Created Job Successfully
                data:
                  _id: 507f1f77bcf86cd799439021
                  createdAt: '2026-03-14T10:00:00.000Z'
                  status: pending
                  forShop: 507f1f77bcf86cd799439031
                  createdBy: 507f1f77bcf86cd799439011
                  files:
                    - hash: 7f5ef3030d649a53bb323029ba3bad31
                      settings:
                        color: false
                        pageType: A4
                        orientation: portrait
                        pagesPerSheet: 1
                        numberOfCopies: 2
                        pageSelection: all
                        sidedness: single
        '400':
          description: The request body was missing fields or contained invalid values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidFiles:
                  value:
                    success: false
                    message: Missing or invalid fields (files)
                    data: {}
                invalidShop:
                  value:
                    success: false
                    message: Missing or invalid fields (forShop)
                    data: {}
                invalidFileReference:
                  value:
                    success: false
                    message: Missing or invalid fields (file[0].hash)
                    data: {}
                invalidSettings:
                  value:
                    success: false
                    message: file[0] pagesPerSheet must be one of [1, 2, 4, 8, 16]
                    data: {}
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/shops:
    get:
      tags:
        - shops
      summary: List shops
      description: Returns all print shops.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Shops fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - shops
                        properties:
                          shops:
                            type: array
                            items:
                              $ref: '#/components/schemas/Shop'
              example:
                success: true
                message: Fetched Shops Successfully
                data:
                  shops:
                    - _id: 507f1f77bcf86cd799439031
                      name: Downtown Branch
                      address: 123 Main Street
                      capabilities:
                        - color
                        - duplex
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/history:
    get:
      tags:
        - history
      summary: Fetch user history
      description: Placeholder endpoint. The route exists but currently returns `501 Not Implemented Yet`.
      security:
        - bearerAuth: []
      responses:
        '501':
          description: Endpoint is not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Not Implemented Yet
                data: {}
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/profile:
    get:
      tags:
        - profile
      summary: Fetch the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - profile
                        properties:
                          profile:
                            $ref: '#/components/schemas/UserProfile'
              example:
                success: true
                message: Fetched Profile Successfully
                data:
                  profile:
                    _id: 507f1f77bcf86cd799439011
                    name: John Doe
                    balance: 0
                    number: '923001234567'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - profile
      summary: Update the authenticated user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  example: John Doe
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - profile
                        properties:
                          profile:
                            $ref: '#/components/schemas/UserProfile'
              example:
                success: true
                message: Updated Profile Successfully
                data:
                  profile:
                    _id: 507f1f77bcf86cd799439011
                    name: John Doe
                    balance: 0
                    number: '923001234567'
        '400':
          description: Name was missing or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Missing or invalid fields (name)
                data: {}
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supply the JWT returned by `/api/auth/verify`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Supply `Apikey <API_KEY>`.

  parameters:
    FileId:
      name: fileId
      in: path
      required: true
      description: Lowercase 32-character hexadecimal file identifier.
      schema:
        type: string
        pattern: '^[0-9a-f]{32}$'
      example: 7f5ef3030d649a53bb323029ba3bad31

  responses:
    UnauthorizedResponse:
      description: JWT authentication failed or was missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingHeader:
              value:
                success: false
                message: Missing Authorization Header
                data: {}
            malformedHeader:
              value:
                success: false
                message: Malformed Authorization Header
                data: {}
            invalidJwt:
              value:
                success: false
                message: Invalid or Expired JWT
                data: {}
            wrongScheme:
              value:
                success: false
                message: Unsupported Authorization Scheme
                data: {}
    ApiKeyUnauthorizedResponse:
      description: API key authentication failed or a bearer token was sent to an API key protected route.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingHeader:
              value:
                success: false
                message: Missing Authorization Header
                data: {}
            malformedHeader:
              value:
                success: false
                message: Malformed Authorization Header
                data: {}
            invalidApiKey:
              value:
                success: false
                message: Invalid API Key
                data: {}
            bearerProvided:
              value:
                success: false
                message: API Key Authentication Required
                data: {}
            wrongScheme:
              value:
                success: false
                message: Unsupported Authorization Scheme
                data: {}
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Internal Server Error
            data: {}

  schemas:
    SuccessResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        message:
          type: string
        data:
          description: Route-specific response payload.
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          enum:
            - false
        message:
          type: string
        data:
          type: object
          additionalProperties: true

    OtpRequest:
      type: object
      required:
        - number
      properties:
        number:
          type: string
          description: E.164 phone number without a leading `+`.
          pattern: '^[1-9]\d{7,14}$'
          example: '923001234567'

    OtpVerifyRequest:
      type: object
      required:
        - code
        - number
      properties:
        code:
          type: string
          example: '12345'
        number:
          type: string
          description: E.164 phone number without a leading `+`.
          pattern: '^[1-9]\d{7,14}$'
          example: '923001234567'

    AuthVerifyData:
      type: object
      required:
        - token
        - profile
      properties:
        token:
          type: string
          example: <jwt>
        profile:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required:
        - _id
        - name
        - balance
        - number
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          example: John Doe
        balance:
          type: number
          example: 0
        number:
          type: string
          example: '923001234567'

    FileUploadData:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          pattern: '^[0-9a-f]{32}$'
          example: 7f5ef3030d649a53bb323029ba3bad31

    PrintSettings:
      type: object
      required:
        - color
        - pageType
        - orientation
        - pagesPerSheet
        - numberOfCopies
        - pageSelection
        - sidedness
      properties:
        color:
          type: boolean
        pageType:
          type: string
          minLength: 1
          example: A4
        orientation:
          type: string
          enum:
            - portrait
            - landscape
        pagesPerSheet:
          type: integer
          enum:
            - 1
            - 2
            - 4
            - 8
            - 16
        numberOfCopies:
          type: integer
          minimum: 1
          example: 2
        pageSelection:
          type: string
          description: Arbitrary selection string. The current implementation accepts any string.
          example: all
        sidedness:
          type: string
          enum:
            - single
            - double

    JobFile:
      type: object
      required:
        - hash
        - settings
      properties:
        hash:
          type: string
          pattern: '^[0-9a-f]{32}$'
          example: 7f5ef3030d649a53bb323029ba3bad31
        settings:
          $ref: '#/components/schemas/PrintSettings'

    CreateJobRequest:
      type: object
      required:
        - files
        - forShop
      properties:
        forShop:
          type: string
          example: 507f1f77bcf86cd799439031
        files:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/JobFile'

    Job:
      type: object
      required:
        - _id
        - createdAt
        - status
        - forShop
        - createdBy
        - files
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439021
        createdAt:
          type: string
          format: date-time
        status:
          type: string
          example: pending
        forShop:
          type: string
          example: 507f1f77bcf86cd799439031
        createdBy:
          type: string
          example: 507f1f77bcf86cd799439011
        files:
          type: array
          items:
            $ref: '#/components/schemas/JobFile'

    Shop:
      type: object
      required:
        - _id
        - name
        - address
        - capabilities
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439031
        name:
          type: string
          example: Downtown Branch
        address:
          type: string
          example: 123 Main Street
        capabilities:
          type: array
          items:
            type: string
